<!DOCTYPE html>
<html>
<body>
<button onclick="trigger()">Trigger</button>

<script>
function trigger() {
    // Create multiple windows (helps lifecycle pressure)
    for (let i = 0; i < 3; i++) {
        let w = window.open("about:blank", "_blank", "width=200,height=200");

        setTimeout(() => {
            try {
                w.close();
            } catch (e) {}
        }, 100);
    }
}
</script>

</body>
</html>
